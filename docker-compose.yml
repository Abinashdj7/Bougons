version: '3.9'

services:

  # ─── Databases ───────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: mongodb
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend Services ─────────────────────────────────────────
  user-service:
    build: ./services/user-service
    container_name: user-service
    ports:
      - "4001:4001"
    env_file:
      - .env
    environment:
      - MONGO_URI=mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/users?authSource=admin
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - PORT=4001
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
    volumes:
      - ./services/user-service:/app
      - /app/node_modules

  api-gateway:
    build: ./services/api-gateway
    container_name: api-gateway
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      - USER_SERVICE_URL=http://user-service:4001
      - RIDE_SERVICE_URL=http://ride-service:4002
      - LOCATION_SERVICE_URL=http://location-service:4003
      - NOTIFICATION_SERVICE_URL=http://notification-service:4005
      - PAYMENT_SERVICE_URL=http://payment-service:4004
      - PORT=4000
    depends_on:
      - user-service
      - ride-service
      - location-service
      - notification-service
      - payment-service
    networks:
      - app-network
    restart: unless-stopped
    volumes:
      - ./services/api-gateway:/app
      - /app/node_modules

  # ─── Frontend Apps ────────────────────────────────────────────
  rider-app:
    build: ./apps/rider-app
    container_name: rider-app
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000
    networks:
      - app-network
    restart: unless-stopped
    volumes:
      - ./apps/rider-app:/app
      - /app/node_modules
      - /app/.next

  driver-app:
    build: ./apps/driver-app
    container_name: driver-app
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000
      - NEXT_PUBLIC_SOCKET_URL=http://localhost:4000
      - PORT=3001
    networks:
      - app-network
    restart: unless-stopped
    volumes:
      - ./apps/driver-app:/app
      - /app/node_modules
      - /app/.next
  ride-service:
    build: ./services/ride-service
    container_name: bougons-ride-service
    ports:
      - "4002:4002"
    env_file:
      - .env
    environment:
      - MONGO_URI=mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/rides?authSource=admin
      - PORT=4002
      - JWT_SECRET=${JWT_SECRET}
      - LOCATION_SERVICE_URL=http://location-service:4003
      - NOTIFICATION_SERVICE_URL=http://notification-service:4005
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
    volumes:
      - ./services/ride-service:/app
      - /app/node_modules

  location-service:
    build: ./services/location-service
    container_name: bougons-location
    ports:
      - "4003:4003"
    env_file:
      - .env
    environment:
      - MONGO_URI=mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/locations?authSource=admin
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - PORT=4003
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
    volumes:
      - ./services/location-service:/app
      - /app/node_modules
  notification-service:
    build: ./services/notification-service
    container_name: bougons-notification
    ports:
      - "4005:4005"
    env_file:
      - .env
    environment:
      - MONGO_URI=mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/notifications?authSource=admin
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - PORT=4005
      - JWT_SECRET=${JWT_SECRET}
      - INTERNAL_SECRET=${INTERNAL_SECRET}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
    volumes:
      - ./services/notification-service:/app
      - /app/node_modules
  payment-service:
    build: ./services/payment-service
    container_name: bougons-payment
    ports:
      - "4004:4004"
    env_file:
      - .env
    environment:
      - MONGO_URI=mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/payments?authSource=admin
      - PORT=4004
      - JWT_SECRET=${JWT_SECRET}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - NOTIFICATION_SERVICE_URL=http://notification-service:4005
      - INTERNAL_SECRET=${INTERNAL_SECRET}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
    volumes:
      - ./services/payment-service:/app
      - /app/node_modules

  admin-app:
    build: ./apps/admin-app
    container_name: bougons-admin
    ports:
      - "3002:3002"
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000
    networks:
      - app-network
    restart: unless-stopped
    volumes:
      - ./apps/admin-app:/app
      - /app/node_modules
      - /app/.next
volumes:
  mongo_data:

networks:
  app-network:
    driver: bridge
